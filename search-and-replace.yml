# search-and-replace.yml

# Package name for namespacing (used in {package_name} placeholder)
package_name: sites_conformes

# Django apps shipped inside the namespaced package.
# NOTE: `config` is intentionally absent — it's the Django project (settings,
# urls, wsgi), not an app, and lives at release-branch root next to manage.py.
apps:
  - blog
  - events
  - forms
  - content_manager
  - proconnect
  - dashboard
  - menus
  - db_storage
  

# App directory renames applied after all text transformations.
# The app dir name stays short ("core") so import paths read
# `{package_name}.core`. The Django app label is still `{package_name}_core`,
# set explicitly in core/apps.py — see the generic apps.py rule above.
app_renames:
  content_manager: core

# Named scopes (rules can reference these by name)
scopes:
  migrations: "**/migrations/**"
  templates: "**/templates/**"
  settings: "**/config/settings*.py"
  all: "**/*"

# File extensions considered "text" (configurable)
text_extensions:
  - .py
  - .html
  - .htm
  - .txt
  - .md
  - .csv
  - .json
  - .yaml
  - .yml
  - .po
  - .ini
  - .cfg
  - .rst
  - .xml
  - .js
  - .ts
  - .css
  - .scss

# Rules. Each rule may use:
#  - scope: reference to a named scope (scopes.<name>)
#  - path_glob: an explicit git ls-files pattern (overrides scope if present)
#  - literal: true -> do a literal string replace (no regex)
#  - search & replace are strings
rules:
  # ---------- Apps configuration ----------
  # Transform app name in AppConfig classes
  - search: '(    name = ")({app})(")'
    replace: '\1{package_name}.\2\3\n    label = "{package_name}_\2"'
    path_glob: "**/apps.py"

  # ---------- Generic patterns (expanded per app) ----------
  - search: 'to="{app}\.'
    replace: 'to="{package_name}_{app}.'
    scope: migrations

  - search: 'through="{app}\.'
    replace: 'through="{package_name}_{app}.'
    scope: migrations

  - search: 'app_name="{app}'
    replace: 'app_name="{package_name}_{app}'
    scope: migrations

  - search: 'apps\.get_model\(\"{app}\"'
    replace: 'apps.get_model("{package_name}_{app}"'
    scope: migrations

  - search: '\"{app}"'
    replace: '"{package_name}_{app}"'
    filter: 'replaces = \[(.*?)\]'
    scope: migrations

  - search: '\"{app}"'
    replace: '"{package_name}_{app}"'
    filter: 'dependencies = \[(.*?)\]'
    scope: migrations

  - search: '"page_type": \["{app}'
    replace: '"page_type": ["{package_name}_{app}'
    scope: migrations

  - search: 'from {app}\.'
    replace: "from {package_name}.{app}."
    scope: all

  - search: '@register.inclusion_tag\("{app}'
    replace: '@register.inclusion_tag("{package_name}_{app}'
    scope: all

  - search: "from {app} import"
    replace: "from {package_name}.{app} import"
    scope: all

  - search: 'include\("{app}\.'
    replace: 'include("{package_name}.{app}.'
    scope: all

  - search: 'template="{app}/'
    replace: 'template="{package_name}_{app}/'
    scope: all

  - search: 'include\ "{app}/'
    replace: 'include "{package_name}_{app}/'
    scope: templates

  - search: 'template = \("{app}'
    replace: 'template = ("{package_name}_{app}'
    scope: all

  - search: 'template = "{app}/'
    replace: 'template = "{package_name}_{app}/'
    scope: all

  - search: 'template_name = "{app}/'
    replace: 'template_name = "{package_name}_{app}/'
    scope: all

  - search: '"template": "{app}/'
    replace: '"template": "{package_name}_{app}/'
    scope: all

  - search: '\ settings.{app}'
    replace: " settings.{package_name}_{app}"
    scope: all

  - search: 'settings.{app}'
    replace: "settings.{package_name}_{app}"
    scope: all

  - search: '"{app}\.blocks'
    replace: '"{package_name}.{app}.blocks'
    scope: migrations

  - search: "import {app}"
    replace: "import {package_name}.{app}"
    scope: migrations

  # ---------- Special-case overrides ----------
  - search: 'content_manager\.models\.MonospaceField'
    replace: "{package_name}.content_manager.models.MonospaceField"
    scope: migrations

  # Bare `content_manager.validators.<x>` references inside migration dict
  # literals (e.g. `"validators": [content_manager.validators.validate_query_string]`).
  # The `import sites_conformes.content_manager.validators` line is rewritten by
  # the generic `import {app}` rule, but use-sites in dict values are not, so
  # they remain bare and raise NameError at import time.
  - search: '\[content_manager\.validators\.'
    replace: "[{package_name}.content_manager.validators."
    scope: migrations

  # Raw SQL table names inside RunSQL — Django prefixes DB tables with the app
  # label, so `forms_formfield` becomes `{package_name}_forms_formfield` after
  # namespacing. Generic rules don't touch raw SQL strings.
  - search: '(\b(?:UPDATE|FROM|JOIN|INTO|TABLE)\s+){app}_'
    replace: '\1{package_name}_{app}_'
    scope: migrations

  - search: " content_manager.blocks.IconPickerBlock"
    replace: " {package_name}.content_manager.blocks.IconPickerBlock"
    scope: migrations
    literal: true

  - search: '"content_manager.utils.'
    replace: '"{package_name}.content_manager.utils.'
    scope: all
    literal: true

  - search: "content_manager.models.{package_name}.content_manager"
    replace: "{package_name}_content_manager.models.{package_name}.content_manager"
    scope: all
    literal: true

  - search: '"blog.Person"'
    replace: '"{package_name}_blog.Person"'
    scope: all
    literal: true

  - search: '"blog.Category"'
    replace: '"{package_name}_blog.Category"'
    scope: all
    literal: true

  - search: '"blog.Organization"'
    replace: '"{package_name}_blog.Organization"'
    scope: all
    literal: true

  - search: '"blog.BlogEntryPage"'
    replace: '"{package_name}_blog.BlogEntryPage"'
    scope: all
    literal: true

  - search: '"blog.BlogIndexPage"'
    replace: '"{package_name}_blog.BlogIndexPage"'
    scope: all
    literal: true

  - search: '"events.EventEntryPage"'
    replace: '"{package_name}_events.EventEntryPage"'
    scope: all
    literal: true

  - search: '"events.EventsIndexPage"'
    replace: '"{package_name}_events.EventsIndexPage"'
    scope: all
    literal: true

  - search: '"content_manager.MegaMenu'
    replace: '"{package_name}_content_manager.MegaMenu'
    path_glob: "**/models.py"
    literal: true

  - search: '"content_manager.ContentPage"'
    replace: '"{package_name}_content_manager.ContentPage"'
    scope: all
    literal: true

  - search: '"content_manager.Tag"'
    replace: '"{package_name}_content_manager.Tag"'
    scope: all
    literal: true

  - search: 'gettext as _'
    replace: 'gettext_lazy as _'
    scope: all
    literal: true

  # ---------- settings.py: namespace bare app references ----------
  # The Django project (config/) lives at release-branch root and imports
  # apps from the installable sites_conformes package. These rules rewrite
  # bare upstream references inside settings.py to fully qualified dotted
  # paths. Scoped to config/settings*.py only so they cannot accidentally
  # touch other files (e.g. test fixtures that contain "blog" literally).
  #
  # These run BEFORE the `content_manager → core` block below so the chain
  # `"content_manager"` → `"{package_name}.content_manager"` → `"{package_name}.core"`
  # produces the final namespaced + renamed form.

  # 1. INSTALLED_APPS bare quoted app names: "blog" → "{package_name}.blog"
  - search: '"{app}"'
    replace: '"{package_name}.{app}"'
    scope: settings
    literal: true

  # 2. Dotted references: "blog.X..." → "{package_name}.blog.X..."
  #    Covers context_processors, backends, storage, models, etc.
  - search: '"{app}.'
    replace: '"{package_name}.{app}.'
    scope: settings
    literal: true

  # 3. Template paths in settings: "content_manager/foo.html" → "{package_name}_core/foo.html"
  - search: '"content_manager/'
    replace: '"{package_name}_core/'
    scope: settings
    literal: true

  # ---------- Rename content_manager → core (post-namespacing) ----------
  # These run after all generic rules have already transformed upstream's
  # "content_manager" into "{package_name}.content_manager" / "{package_name}_content_manager".
  # They rename the result to "{package_name}.core" (import path matching the
  # app_renames target dir) and "{package_name}_core" (Django app label).

  - search: "from {package_name}.content_manager"
    replace: "from {package_name}.core"
    scope: all
    literal: true

  - search: '"{package_name}.content_manager'
    replace: '"{package_name}.core'
    scope: all
    literal: true

  - search: "{package_name}_content_manager"
    replace: "{package_name}_core"
    scope: all
    literal: true

  # ---------- Root template references → {package_name}_core/ ----------
  # After move_root_templates_to_core() runs, all bare template references
  # (extends/include "base.html", "blocks/foo.html", "menus/foo.html") must be
  # updated to use the namespaced core path.

  - search: '{% extends "base.html" %}'
    replace: '{% extends "{package_name}_core/base.html" %}'
    scope: all
    literal: true

  - search: "{% extends 'base.html' %}"
    replace: "{% extends '{package_name}_core/base.html' %}"
    scope: all
    literal: true

  - search: '{% include "blocks/'
    replace: '{% include "{package_name}_core/blocks/'
    scope: all
    literal: true

  - search: "{% include 'blocks/"
    replace: "{% include '{package_name}_core/blocks/"
    scope: all
    literal: true

  - search: 'template="menus/'
    replace: 'template="{package_name}_core/menus/'
    scope: all
    literal: true

  - search: "template='menus/"
    replace: "template='{package_name}_core/menus/"
    scope: all
    literal: true

  - search: 'sub_menu_template="menus/'
    replace: 'sub_menu_template="{package_name}_core/menus/'
    scope: all
    literal: true

  - search: "sub_menu_template='menus/"
    replace: "sub_menu_template='{package_name}_core/menus/"
    scope: all
    literal: true

  # urls.py: inject template_name into error handler calls
  - search: 'path("404/", page_not_found, kwargs={"exception": Exception("Page not Found")})'
    replace: 'path("404/", page_not_found, kwargs={"exception": Exception("Page not Found"), "template_name": "{package_name}_core/404.html"})'
    scope: all
    literal: true

  - search: "path(\"500/\", server_error),"
    replace: "path(\"500/\", partial(server_error, template_name=\"{package_name}_core/500.html\")),"
    scope: all
    literal: true

  - search: 'template_name="robots.txt"'
    replace: 'template_name="{package_name}_core/robots.txt"'
    scope: all
    literal: true

  - search: "from django.views.defaults import page_not_found, server_error"
    replace: "from functools import partial\n\nfrom django.views.defaults import page_not_found, server_error"
    scope: all
    literal: true

  # ---------- DynamicStreamField transformations ----------
  # NOTE: Run with -j 1 flag to avoid race conditions when multiple rules target same file
